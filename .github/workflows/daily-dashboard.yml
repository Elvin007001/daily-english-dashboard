name: Daily English Dashboard

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-english-dashboard
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Generate dashboard with AI
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4.1-mini' }}
        run: |
          if [ -n "$OPENAI_API_KEY" ]; then
            npm run generate:dashboard
          else
            echo "OPENAI_API_KEY is not configured. Deploying the existing dashboard without AI update."
          fi

      - name: Commit updated dashboard
        run: |
          git config user.name "daily-dashboard-bot"
          git config user.email "daily-dashboard-bot@users.noreply.github.com"
          git add public/index.html outputs/daily-english-dashboard.html data/dashboard-state.json
          git diff --staged --quiet || git commit -m "Update daily English dashboard"
          git push

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify live dashboard
        run: |
          node --input-type=module -e "const url='${{ steps.deployment.outputs.page_url }}'; const html=await (await fetch(url)).text(); const required=['flip-card','localStorage','data-correct','apple-mobile-web-app-capable']; for (const marker of required) { if (!html.includes(marker)) throw new Error('Missing live marker: '+marker); } console.log('Live dashboard verified:', url, html.length);"
